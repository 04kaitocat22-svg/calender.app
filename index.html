<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxza4snn_WiIIUiEJPcqewtYUG3KODcJXHEt4UAqJSUzANh_BLuCDZtXPlm2FOpSH-K/exec';
    
    const now = new Date();
    let displayYear = now.getFullYear();
    let displayMonth = now.getMonth() + 1;
    let selectedDateStr = "";
    window.events = {}; // 初回読み込み前でもエラーにならないよう定義

    // 【重要】サイトを開いた瞬間に「とりあえず今の月」を表示する
    renderCalendar();

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL + '?cache=' + new Date().getTime());
            const data = await res.json();
            window.events = {};
            data.slice(1).forEach(row => {
                const [date, start, end, title, color] = row;
                if(!window.events[date]) window.events[date] = [];
                window.events[date].push({start, end, title, color});
            });
            // データ取得後に再描画
            renderCalendar();
            if(selectedDateStr) updateChart();
        } catch(e) {
            console.error("データ取得失敗:", e);
        }
    }

    function renderCalendar() {
        document.getElementById('monthDisplay').innerText = `${displayYear}年 ${displayMonth}月`;
        const firstDay = new Date(displayYear, displayMonth - 1, 1).getDay();
        const lastDate = new Date(displayYear, displayMonth, 0).getDate();
        
        let html = '<tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr><tr>';
        for(let i=0; i<firstDay; i++) html += '<td></td>';
        for(let d=1; d<=lastDate; d++) {
            if((firstDay + d - 1) % 7 === 0) html += '</tr><tr>';
            const dateStr = `${displayYear}-${displayMonth}-${d}`;
            const isSelected = (selectedDateStr === dateStr);
            html += `<td class="${isSelected ? 'selected' : ''}" onclick="selectDate(${displayYear}, ${displayMonth}, ${d})">${d}</td>`;
        }
        document.getElementById('calendarTable').innerHTML = html + '</tr>';
    }

    function selectDate(y, m, d) {
        selectedDateStr = `${y}-${m}-${d}`;
        document.getElementById('selectedDateText').innerText = `${m}月${d}日の予定`;
        updateChart();
        renderCalendar();
    }

    async function addEvent() {
        if(!selectedDateStr) return alert("日付を選択してね");
        const body = JSON.stringify({
            type: 'add',
            date: selectedDateStr,
            start: document.getElementById('start').value,
            end: document.getElementById('end').value,
            title: document.getElementById('title').value,
            color: document.getElementById('color').value
        });
        
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body });
        setTimeout(fetchData, 1000);
    }

    function updateChart() {
        const list = document.getElementById('eventList');
        list.innerHTML = "";
        (window.events[selectedDateStr] || []).forEach(e => {
            list.innerHTML += `<div>${e.start}~${e.end} : ${e.title}</div>`;
        });
    }

    function changeMonth(delta) {
        displayMonth += delta;
        if(displayMonth > 12) { displayMonth = 1; displayYear++; }
        if(displayMonth < 1) { displayMonth = 12; displayYear--; }
        renderCalendar();
    }

    // 最後にデータを取得しにいく
    fetchData();
</script>

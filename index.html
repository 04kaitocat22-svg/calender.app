<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タスク管理カレンダー</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; }
        .calendar, .editor { background: white; width: 100%; max-width: 400px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        td { text-align: center; padding: 10px 0; cursor: pointer; border: 1px solid #eee; }
        .selected { background-color: #e3f2fd; font-weight: bold; }
        #chart-container { position: relative; width: 200px; height: 200px; margin: 20px auto; border-radius: 50%; border: 2px solid #ddd; }
        #chart { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; }
        .segment { position: absolute; width: 100%; height: 100%; }
        #eventList { margin-top: 15px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="calendar">
    <div class="header">
        <button onclick="changeMonth(-1)">＜</button>
        <div id="monthDisplay"></div>
        <button onclick="changeMonth(1)">＞</button>
    </div>
    <table id="calendarTable"></table>
</div>

<div class="editor">
    <h3 id="selectedDateText">日付を選択してください</h3>
    <div id="chart-container"><div id="chart"></div></div>
    <div id="eventList"></div>
    <hr>
    <input type="time" id="start"> ～ <input type="time" id="end"><br>
    <input type="text" id="title" placeholder="予定名">
    <input type="color" id="color" value="#ff5722">
    <button onclick="addEvent()">追加</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxza4snn_WiIIUiEJPcqewtYUG3KODcJXHEt4UAqJSUzANh_BLuCDZtXPlm2FOpSH-K/exec';
    
    // 【修正済み】アクセスした瞬間の日付を基準にします
    const now = new Date();
    let displayYear = now.getFullYear();
    let displayMonth = now.getMonth() + 1;
    let selectedDateStr = "";

    async function fetchData() {
        const res = await fetch(SCRIPT_URL + '?cache=' + new Date().getTime());
        const data = await res.json();
        window.events = {};
        data.slice(1).forEach(row => {
            const [date, start, end, title, color] = row;
            if(!window.events[date]) window.events[date] = [];
            window.events[date].push({start, end, title, color});
        });
        renderCalendar();
        if(selectedDateStr) updateChart();
    }

    function renderCalendar() {
        document.getElementById('monthDisplay').innerText = `${displayYear}年 ${displayMonth}月`;
        const firstDay = new Date(displayYear, displayMonth - 1, 1).getDay();
        const lastDate = new Date(displayYear, displayMonth, 0).getDate();
        
        let html = '<tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr><tr>';
        for(let i=0; i<firstDay; i++) html += '<td></td>';
        for(let d=1; d<=lastDate; d++) {
            if((firstDay + d - 1) % 7 === 0) html += '</tr><tr>';
            const dateStr = `${displayYear}-${displayMonth}-${d}`;
            const isSelected = (selectedDateStr === dateStr);
            html += `<td class="${isSelected ? 'selected' : ''}" onclick="selectDate(${displayYear}, ${displayMonth}, ${d})">${d}</td>`;
        }
        document.getElementById('calendarTable').innerHTML = html + '</tr>';
    }

    function selectDate(y, m, d) {
        selectedDateStr = `${y}-${m}-${d}`;
        document.getElementById('selectedDateText').innerText = `${m}月${d}日の予定`;
        updateChart();
        renderCalendar();
    }

    async function addEvent() {
        if(!selectedDateStr) return alert("日付を選択してね");
        const body = JSON.stringify({
            type: 'add',
            date: selectedDateStr,
            start: document.getElementById('start').value,
            end: document.getElementById('end').value,
            title: document.getElementById('title').value,
            color: document.getElementById('color').value
        });
        
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body });
        setTimeout(fetchData, 1000);
    }

    function updateChart() {
        const list = document.getElementById('eventList');
        list.innerHTML = "";
        (window.events[selectedDateStr] || []).forEach(e => {
            list.innerHTML += `<div>${e.start}~${e.end} : ${e.title}</div>`;
        });
    }

    function changeMonth(delta) {
        displayMonth += delta;
        if(displayMonth > 12) { displayMonth = 1; displayYear++; }
        if(displayMonth < 1) { displayMonth = 12; displayYear--; }
        renderCalendar();
    }

    fetchData();
</script>
</body>
</html>

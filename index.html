<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タスク管理カレンダー</title>
    <style>
        /* ...既存のスタイルを維持... */
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; }
        .calendar, .editor { background: white; width: 100%; max-width: 400px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        td { text-align: center; padding: 10px 0; cursor: pointer; border: 1px solid #eee; }
        .today { border: 2px solid #ff5722; color: #ff5722; font-weight: bold; }
        .selected { background-color: #e3f2fd; }
        #chart-container { position: relative; width: 200px; height: 200px; margin: 20px auto; border-radius: 50%; border: 2px solid #ddd; }
        .segment { position: absolute; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="todayDisplay" style="margin-bottom: 10px; font-weight: bold;"></div>
<div class="calendar">
    <div class="header">
        <button onclick="changeMonth(-1)">＜</button>
        <div><span id="monthYear"></span> <button onclick="jumpToToday()">今日</button></div>
        <button onclick="changeMonth(1)">＞</button>
    </div>
    <table id="calendarTable"></table>
</div>

<div class="editor">
    <h3 id="selectedDateText">日付を選択</h3>
    <div id="chart-container"><div id="chart"></div></div>
    <div id="eventList"></div>
    <button id="modeBtn" onclick="toggleDeleteMode()">削除モード</button>
    <button id="deleteBtn" style="display:none; color:red;" onclick="confirmDelete()">削除実行</button>
    <hr>
    <input type="time" id="start"> ～ <input type="time" id="end"><br>
    <input type="text" id="title" placeholder="予定名">
    <input type="color" id="color" value="#ff5722">
    <button onclick="addEvent()">追加</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxOtwva56rpnS9yC6ZxF0BR1pXniPNEssbhlvB8lSKpEB0yS-lTZyvFc7bapoBZc5h/exec';
    let currentDate = new Date();
    let events = {};
    let selectedDate = "";
    let isDeleteMode = false;

    async function fetchData() {
        const res = await fetch(SCRIPT_URL + '?t=' + new Date().getTime());
        const data = await res.json();
        events = {};
        data.slice(1).forEach(row => {
            const [date, start, end, title, color] = row;
            if(!events[date]) events[date] = [];
            events[date].push({start, end, title, color});
        });
        renderCalendar();
        if(selectedDate) updateChart();
    }

    // ★削除機能の実装
    async function confirmDelete() {
        const checks = document.querySelectorAll('.delete-check:checked');
        const indices = Array.from(checks).map(c => parseInt(c.value)).sort((a,b) => b-a);
        
        let dayEvents = events[selectedDate] || [];
        indices.forEach(idx => dayEvents.splice(idx, 1));
        
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({type: 'delete', date: selectedDate, remainingEvents: dayEvents})
        });
        isDeleteMode = false;
        document.getElementById('deleteBtn').style.display = "none";
        document.getElementById('modeBtn').innerText = "削除モード";
        await fetchData();
    }

    // ... (renderCalendar, addEvent, updateChart, toggleDeleteMode 等は元のロジックを維持) ...
    // ※元のコードの function ... はそのままここに繋げてください
    

    function changeMonth(delta) {
        displayMonth += delta;
        if(displayMonth > 12) { displayMonth = 1; displayYear++; }
        if(displayMonth < 1) { displayMonth = 12; displayYear--; }
        renderCalendar();
    }

    fetchData();
</script>
</body>
</html>
